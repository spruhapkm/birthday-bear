<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Baba 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #f5e6c8;
    --parchment: #eddcaa;
    --aged: #d4b97a;
    --wax-red: #8B1A1A;
    --wax-light: #c0392b;
    --ink: #3a2510;
    --sepia: #7a5020;
    --gold: #c9952a;
    --gold-light: #f0c040;
    --bear-brown: #7a4a1e;
    --bear-mid: #a0682e;
    --bear-light: #c8945a;
    --ribbon-red: #b52020;
    --ribbon-gold: #e0a020;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: #1a0f05;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'IM Fell English', serif;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, #3a1e00 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 100%, #1f0d00 0%, transparent 60%),
      #120800;
    z-index: 0;
  }

  /* Bokeh lights */
  .bokeh {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }
  .bokeh span {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,140,30,0.18) 0%, transparent 70%);
    animation: bokehFloat linear infinite;
  }

  @keyframes bokehFloat {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
  }

  /* Floating dust particles */
  .dust { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .dust span {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(220,180,80,0.5);
    border-radius: 50%;
    animation: dustDrift linear infinite;
  }
  @keyframes dustDrift {
    0%   { transform: translate(0,0); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.4; }
    100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
  }

  /* Main stage */
  #stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px;
  }

  /* Title */
  .page-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    color: var(--aged);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0.8;
    text-shadow: 0 0 20px rgba(200,150,40,0.4);
  }

  /* ═══════════════════════════════════
     ENVELOPE
  ═══════════════════════════════════ */
  #envelope-container {
    position: relative;
    width: 440px;
    height: 290px;
    cursor: pointer;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.7)) drop-shadow(0 4px 12px rgba(180,130,30,0.2));
    transition: transform 0.3s ease;
  }
  #envelope-container:hover:not(.opened) { transform: translateY(-4px) scale(1.01); }
  #envelope-container.opened { cursor: default; }

  /* Envelope body */
  #env-body {
    position: absolute; inset: 0;
    background: var(--cream);
    border-radius: 4px 4px 6px 6px;
    border: 2px solid var(--aged);
    overflow: hidden;
  }

  /* Aged texture lines */
  #env-body::before {
    content:'';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      transparent, transparent 24px,
      rgba(160,120,50,0.08) 25px
    );
  }

  /* Postage stamp */
  .stamp {
    position: absolute;
    top: 16px; right: 18px;
    width: 52px; height: 62px;
    background: #fff8ed;
    border: 2px solid var(--aged);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 6;
    box-shadow: inset 0 0 0 3px #f0e0b0;
    font-size: 22px;
  }
  .stamp::before {
    content: '';
    position: absolute; inset: -6px;
    background: repeating-linear-gradient(0deg, transparent, transparent 7px, #e8d5a8 7px, #e8d5a8 9px),
                repeating-linear-gradient(90deg, transparent, transparent 7px, #e8d5a8 7px, #e8d5a8 9px);
    background-size: 9px 9px;
    z-index: -1;
  }
  .stamp-label {
    font-size: 7px;
    color: var(--sepia);
    letter-spacing: 0.5px;
    margin-top: 2px;
    font-family: 'IM Fell English', serif;
  }

  /* Postmark circle */
  .postmark {
    position: absolute;
    top: 20px; left: 22px;
    width: 72px; height: 44px;
    border: 1.5px solid rgba(120,80,30,0.4);
    border-radius: 50%;
    z-index: 6;
    display: flex; align-items: center; justify-content: center;
  }
  .postmark-inner {
    font-size: 7.5px;
    color: rgba(120,80,30,0.6);
    text-align: center;
    line-height: 1.4;
    font-family: 'IM Fell English', serif;
    transform: rotate(-10deg);
  }

  /* Inner diagonal lines (envelope crease decoration) */
  .env-crease {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 145px;
    overflow: hidden;
    z-index: 2;
  }
  .env-crease::before {
    content:'';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 0;
    border-left: 220px solid transparent;
    border-bottom: 145px solid rgba(200,170,100,0.35);
    border-right: 220px solid transparent;
  }

  /* ── FLAP ── */
  #env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 155px;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    background: linear-gradient(160deg, #f0dca0 0%, var(--parchment) 60%, #d8c480 100%);
    border-bottom: 1.5px solid var(--aged);
    transform-origin: top center;
    transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 5;
    backface-visibility: hidden;
  }
  /* Flap inner vein lines */
  #env-flap::before {
    content:'';
    position: absolute;
    top: 20px; left: 50%;
    width: 1px; height: 120px;
    background: rgba(160,120,50,0.2);
    transform: translateX(-50%);
  }
  #env-flap.open {
    transform: rotateX(180deg);
  }

  /* Side flap shadows */
  .env-side-left, .env-side-right {
    position: absolute;
    top: 0; bottom: 0;
    width: 50%;
    z-index: 3;
  }
  .env-side-left {
    left: 0;
    background: linear-gradient(to right, rgba(0,0,0,0.07) 0%, transparent 100%);
  }
  .env-side-right {
    right: 0;
    background: linear-gradient(to left, rgba(0,0,0,0.07) 0%, transparent 100%);
  }

  /* ── WAX SEAL ── */
  #seal-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 15;
    width: 80px; height: 80px;
    cursor: pointer;
    transition: transform 0.25s ease, filter 0.25s ease;
    filter: drop-shadow(0 4px 12px rgba(100,0,0,0.5));
  }
  #seal-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    filter: drop-shadow(0 6px 20px rgba(150,20,20,0.7));
  }
  #seal-btn.gone {
    animation: sealPop 0.4s ease forwards;
  }
  @keyframes sealPop {
    0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    50%  { transform: translate(-50%,-50%) scale(1.3); opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
  }

  /* Hint text */
  #hint {
    margin-top: 12px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--aged);
    letter-spacing: 2px;
    opacity: 0.75;
    transition: opacity 0.5s;
    text-align: center;
  }
  #hint.gone { opacity: 0; pointer-events: none; }

  /* Pulse ring animation on seal */
  #pulse-ring {
    animation: pulseRing 2s ease-out infinite;
    transform-origin: center;
  }
  @keyframes pulseRing {
    0%   { r: 28; opacity: 0.6; }
    100% { r: 42; opacity: 0; }
  }

  /* ═══════════════════════════════════
     CONFETTI
  ═══════════════════════════════════ */
  .confetti-piece {
    position: fixed;
    top: 50%; left: 50%;
    pointer-events: none;
    border-radius: 2px;
    animation: confettiBurst var(--dur) var(--ease) forwards;
    z-index: 100;
  }
  @keyframes confettiBurst {
    0%   { transform: translate(-50%,-50%) translate(0,0) rotate(0deg) scale(1); opacity:1; }
    80%  { opacity: 1; }
    100% { transform: translate(-50%,-50%) translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(var(--ts)); opacity: 0; }
  }

  /* ═══════════════════════════════════
     BEAR SECTION
  ═══════════════════════════════════ */
  #bear-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(60px) scale(0.8);
    transition: opacity 0.8s ease 0.6s, transform 0.9s cubic-bezier(0.2, 1.4, 0.4, 1) 0.6s;
    pointer-events: none;
    margin-top: -20px;
  }
  #bear-section.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* Banner */
  #banner-wrap {
    position: relative;
    width: 400px;
    height: 68px;
    margin-bottom: 0px;
  }
  #banner-text {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 17px;
    font-weight: 700;
    color: #fff8e0;
    letter-spacing: 2px;
    text-shadow: 1px 1px 0 rgba(100,30,0,0.6), 0 0 12px rgba(240,190,60,0.5);
    clip-path: inset(0 100% 0 0);
    transition: clip-path 2s cubic-bezier(0.4, 0, 0.2, 1) 1.4s;
    white-space: nowrap;
    z-index: 2;
  }
  #banner-text.reveal { clip-path: inset(0 0% 0 0); }

  /* Banner SVG is rendered inline */
  #banner-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* Bear SVG */
  #bear-svg {
    width: 220px;
    height: 240px;
    margin-top: -8px;
    /* subtle bounce */
    animation: bearBounce 3s ease-in-out infinite 2s;
  }
  @keyframes bearBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  /* Sparkles */
  .sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    animation: sparkleAnim 1.4s ease-out forwards;
    z-index: 80;
  }
  @keyframes sparkleAnim {
    0%   { transform: scale(0) rotate(0deg); opacity: 0; }
    30%  { transform: scale(1.5) rotate(20deg); opacity: 1; }
    100% { transform: scale(0.5) rotate(60deg) translateY(-40px); opacity: 0; }
  }

  /* Message below */
  #message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--parchment);
    opacity: 0;
    text-align: center;
    margin-top: 10px;
    transition: opacity 1s ease 3.5s;
    text-shadow: 0 0 20px rgba(200,150,40,0.5);
    line-height: 1.6;
    letter-spacing: 0.5px;
  }
  #message.show { opacity: 0.85; }

  /* Floating stars decoration */
  .deco-star {
    position: fixed;
    pointer-events: none;
    color: var(--gold-light);
    opacity: 0;
    z-index: 5;
    animation: decoFloat linear infinite;
    font-size: 14px;
  }
  @keyframes decoFloat {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
    15%  { opacity: 0.7; }
    85%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-80px) rotate(180deg); }
  }
</style>
</head>
<body>

<!-- Atmospheric bokeh -->
<div class="bokeh" id="bokeh"></div>
<div class="dust" id="dust"></div>

<div id="stage">
  <div class="page-title">A Special Delivery For You</div>

  <!-- ENVELOPE -->
  <div id="envelope-container" onclick="openEnvelope()">
    <div id="env-body">
      <div class="env-crease"></div>
      <div class="env-side-left"></div>
      <div class="env-side-right"></div>

      <!-- Postage stamp -->
      <div class="stamp">🎂<div class="stamp-label">BIRTHDAY</div></div>

      <!-- Postmark -->
      <div class="postmark">
        <div class="postmark-inner">SPECIAL<br>DELIVERY<br>✦ 2025 ✦</div>
      </div>
    </div>

    <!-- Flap -->
    <div id="env-flap"></div>

    <!-- Wax Seal -->
    <svg id="seal-btn" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" title="Break seal to open">
      <!-- wax drip shadow -->
      <ellipse cx="40" cy="46" rx="32" ry="24" fill="rgba(0,0,0,0.3)"/>
      <!-- wax base drip -->
      <ellipse cx="40" cy="42" rx="32" ry="24" fill="#6b0f0f"/>
      <!-- main wax -->
      <ellipse cx="40" cy="40" rx="32" ry="24" fill="#9b1a1a"/>
      <!-- highlight layer -->
      <ellipse cx="40" cy="38" rx="30" ry="22" fill="#b52222"/>
      <!-- outer embossed ring -->
      <circle cx="40" cy="40" r="24" fill="none" stroke="#7a0f0f" stroke-width="2"/>
      <!-- star ring pattern -->
      <circle cx="40" cy="40" r="20" fill="none" stroke="#d4624a" stroke-width="1" stroke-dasharray="3.5 2.5"/>
      <!-- inner ring -->
      <circle cx="40" cy="40" r="15" fill="#a01818"/>
      <!-- Monogram -->
      <text x="40" y="44" text-anchor="middle" font-family="Cinzel Decorative,serif" font-size="13" font-weight="700" fill="#f8d8c8" letter-spacing="1">HB</text>
      <!-- shine -->
      <ellipse cx="30" cy="32" rx="6" ry="4" fill="rgba(255,220,200,0.25)" transform="rotate(-20,30,32)"/>
      <ellipse cx="50" cy="35" rx="3" ry="2" fill="rgba(255,220,200,0.15)" transform="rotate(10,50,35)"/>
      <!-- Animated pulse ring -->
      <circle id="pulse-ring" cx="40" cy="40" r="28" fill="none" stroke="#d42020" stroke-width="1.5"/>
    </svg>
  </div>

  <div id="hint">✦ &nbsp; Break the seal to reveal &nbsp; ✦</div>

  <!-- BEAR + BANNER (hidden initially) -->
  <div id="bear-section">
    <!-- Banner -->
    <div id="banner-wrap">
      <svg id="banner-svg" viewBox="0 0 400 68" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bannerG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e03030"/>
            <stop offset="100%" stop-color="#9a1010"/>
          </linearGradient>
          <linearGradient id="goldG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f0c040"/>
            <stop offset="100%" stop-color="#a07010"/>
          </linearGradient>
        </defs>
        <!-- Banner body -->
        <rect x="16" y="8" width="368" height="52" rx="4" fill="url(#bannerG)"/>
        <!-- Gold trim top -->
        <rect x="16" y="8" width="368" height="7" rx="4" fill="url(#goldG)" opacity="0.85"/>
        <!-- Gold trim bottom -->
        <rect x="16" y="53" width="368" height="7" rx="4" fill="url(#goldG)" opacity="0.85"/>
        <!-- Wavy top edge -->
        <path d="M16,15 Q32,9 48,15 Q64,21 80,15 Q96,9 112,15 Q128,21 144,15 Q160,9 176,15 Q192,21 208,15 Q224,9 240,15 Q256,21 272,15 Q288,9 304,15 Q320,21 336,15 Q352,9 368,15 Q384,21 384,15" fill="none" stroke="#c09020" stroke-width="1.2" opacity="0.7"/>
        <!-- Wavy bottom edge -->
        <path d="M16,53 Q32,59 48,53 Q64,47 80,53 Q96,59 112,53 Q128,47 144,53 Q160,59 176,53 Q192,47 208,53 Q224,59 240,53 Q256,47 272,53 Q288,59 304,53 Q320,47 336,53 Q352,59 368,53 Q384,47 384,53" fill="none" stroke="#c09020" stroke-width="1.2" opacity="0.7"/>
        <!-- Left pole -->
        <rect x="4" y="3" width="8" height="62" rx="4" fill="url(#goldG)"/>
        <circle cx="8" cy="4" r="7" fill="url(#goldG)"/>
        <circle cx="8" cy="4" r="4" fill="#f5d040"/>
        <!-- Right pole -->
        <rect x="388" y="3" width="8" height="62" rx="4" fill="url(#goldG)"/>
        <circle cx="392" cy="4" r="7" fill="url(#goldG)"/>
        <circle cx="392" cy="4" r="4" fill="#f5d040"/>
        <!-- Diamond ornaments -->
        <polygon points="200,12 203,18 200,24 197,18" fill="#f5d040" opacity="0.8"/>
        <polygon points="100,12 103,18 100,24 97,18" fill="#f5d040" opacity="0.6"/>
        <polygon points="300,12 303,18 300,24 297,18" fill="#f5d040" opacity="0.6"/>
      </svg>
      <div id="banner-text">🎂 &nbsp; Happy Birthday Baba &nbsp; 🎂</div>
    </div>

    <!-- BEAR SVG -->
    <svg id="bear-svg" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow -->
      <ellipse cx="110" cy="232" rx="55" ry="8" fill="rgba(0,0,0,0.3)"/>

      <!-- Body -->
      <ellipse cx="110" cy="172" rx="54" ry="58" fill="var(--bear-brown)"/>
      <!-- Belly -->
      <ellipse cx="110" cy="184" rx="34" ry="38" fill="var(--bear-light)"/>

      <!-- Legs -->
      <ellipse cx="84" cy="220" rx="20" ry="14" fill="var(--bear-brown)"/>
      <ellipse cx="136" cy="220" rx="20" ry="14" fill="var(--bear-brown)"/>
      <!-- Feet -->
      <ellipse cx="80" cy="228" rx="16" ry="9" fill="#5a3010"/>
      <ellipse cx="140" cy="228" rx="16" ry="9" fill="#5a3010"/>

      <!-- Arms outstretched holding banner poles -->
      <!-- Left arm -->
      <path d="M66,158 Q38,148 18,132" stroke="var(--bear-brown)" stroke-width="22" stroke-linecap="round" fill="none"/>
      <!-- Right arm -->
      <path d="M154,158 Q182,148 202,132" stroke="var(--bear-brown)" stroke-width="22" stroke-linecap="round" fill="none"/>
      <!-- Paws -->
      <ellipse cx="16" cy="130" rx="13" ry="10" fill="#5a3010" transform="rotate(-25,16,130)"/>
      <ellipse cx="204" cy="130" rx="13" ry="10" fill="#5a3010" transform="rotate(25,204,130)"/>
      <!-- Paw pads -->
      <circle cx="13" cy="129" r="3" fill="#7a4020" opacity="0.5"/>
      <circle cx="20" cy="127" r="3" fill="#7a4020" opacity="0.5"/>
      <circle cx="205" cy="129" r="3" fill="#7a4020" opacity="0.5"/>
      <circle cx="198" cy="127" r="3" fill="#7a4020" opacity="0.5"/>

      <!-- Head -->
      <circle cx="110" cy="104" r="52" fill="var(--bear-brown)"/>

      <!-- Ears -->
      <circle cx="68" cy="64" r="22" fill="var(--bear-brown)"/>
      <circle cx="68" cy="64" r="13" fill="var(--bear-light)"/>
      <circle cx="152" cy="64" r="22" fill="var(--bear-brown)"/>
      <circle cx="152" cy="64" r="13" fill="var(--bear-light)"/>

      <!-- Face muzzle -->
      <ellipse cx="110" cy="118" rx="27" ry="20" fill="var(--bear-light)"/>

      <!-- Eyes -->
      <circle cx="93" cy="98" r="8" fill="#1a0d04"/>
      <circle cx="127" cy="98" r="8" fill="#1a0d04"/>
      <!-- Eye shine -->
      <circle cx="96" cy="95" r="3" fill="white"/>
      <circle cx="130" cy="95" r="3" fill="white"/>
      <!-- Iris glint -->
      <circle cx="97" cy="96" r="1.5" fill="#c8a060" opacity="0.6"/>
      <circle cx="131" cy="96" r="1.5" fill="#c8a060" opacity="0.6"/>

      <!-- Nose -->
      <ellipse cx="110" cy="112" rx="8" ry="6" fill="#1a0d04"/>
      <!-- Nose shine -->
      <ellipse cx="108" cy="110" rx="2.5" ry="1.5" fill="rgba(255,255,255,0.4)"/>

      <!-- Smile -->
      <path d="M98,124 Q110,134 122,124" stroke="#1a0d04" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- Mouth center -->
      <line x1="110" y1="118" x2="110" y2="124" stroke="#1a0d04" stroke-width="2" stroke-linecap="round"/>

      <!-- Rosy cheeks -->
      <ellipse cx="80" cy="116" rx="10" ry="7" fill="rgba(220,80,50,0.28)"/>
      <ellipse cx="140" cy="116" rx="10" ry="7" fill="rgba(220,80,50,0.28)"/>

      <!-- Party hat -->
      <polygon points="110,48 84,6 136,6" fill="#c01818" stroke="#8a0a0a" stroke-width="1.5"/>
      <!-- Hat stripe -->
      <path d="M91,30 Q110,26 129,30" stroke="#f5c030" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M97,18 Q110,15 123,18" stroke="#f5c030" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
      <!-- Hat pompom -->
      <circle cx="110" cy="6" r="8" fill="#f5c030"/>
      <circle cx="110" cy="6" r="5" fill="#f0d870"/>
      <!-- Hat band -->
      <rect x="85" y="45" width="50" height="5" rx="2" fill="#f5c030" opacity="0.9"/>

      <!-- Bow tie -->
      <polygon points="95,152 110,158 95,164" fill="#c01818"/>
      <polygon points="125,152 110,158 125,164" fill="#c01818"/>
      <circle cx="110" cy="158" r="5" fill="#e03030"/>
    </svg>

    <!-- Message -->
    <div id="message">
      Wishing you a wonderful day filled with joy, laughter, and love 🌟<br/>
      May all your dreams come true, Baba 🎉
    </div>
  </div>
</div>

<!-- Confetti container -->
<div id="confetti-layer" style="position:fixed;inset:0;pointer-events:none;z-index:200;"></div>

<script>
/* ── Bokeh lights ── */
const bokehEl = document.getElementById('bokeh');
for (let i = 0; i < 18; i++) {
  const s = document.createElement('span');
  const sz = 60 + Math.random() * 180;
  s.style.cssText = `
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}%;
    top:${80 + Math.random()*30}%;
    animation-duration:${10 + Math.random()*18}s;
    animation-delay:${Math.random()*12}s;
  `;
  bokehEl.appendChild(s);
}

/* ── Dust ── */
const dustEl = document.getElementById('dust');
for (let i = 0; i < 30; i++) {
  const s = document.createElement('span');
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --dx:${(Math.random()-0.5)*80}px;
    --dy:${-(40+Math.random()*120)}px;
    animation-duration:${6+Math.random()*10}s;
    animation-delay:${Math.random()*8}s;
  `;
  dustEl.appendChild(s);
}

/* ── Floating decorative stars ── */
function spawnDecoStar() {
  const s = document.createElement('div');
  s.className = 'deco-star';
  s.textContent = ['✦','✧','★','✶','✸'][Math.floor(Math.random()*5)];
  s.style.cssText = `
    left:${10+Math.random()*80}%;
    top:${20+Math.random()*60}%;
    font-size:${10+Math.random()*14}px;
    animation-duration:${4+Math.random()*6}s;
    animation-delay:${Math.random()*3}s;
  `;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 10000);
}
setInterval(spawnDecoStar, 1200);

/* ── Confetti burst ── */
const CONFETTI_COLORS = [
  '#f5c030','#e03030','#30a0e0','#30c060','#e060c0','#f0a030',
  '#c030e0','#30e0c0','#ffffff','#ffdd44','#ff6644'
];
const CONFETTI_SHAPES = ['rect','circle','ribbon'];

function burst(cx, cy) {
  const layer = document.getElementById('confetti-layer');
  const count = 160;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const speed = 120 + Math.random() * 340;
    const tx = Math.cos(angle) * speed;
    const ty = Math.sin(angle) * speed + (200 + Math.random() * 300);
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    const shape = CONFETTI_SHAPES[Math.floor(Math.random() * CONFETTI_SHAPES.length)];
    const size = 7 + Math.random() * 11;
    const dur = 1.4 + Math.random() * 1.2;
    const ease = ['ease-out','cubic-bezier(0.2,0.8,0.4,1)','cubic-bezier(0.3,0.6,0.5,1)'][Math.floor(Math.random()*3)];

    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${shape === 'ribbon' ? 4 : size}px;
      height: ${shape === 'ribbon' ? size*2.5 : size}px;
      background: ${color};
      border-radius: ${shape === 'circle' ? '50%' : shape === 'ribbon' ? '1px' : '2px'};
      --tx: ${tx}px;
      --ty: ${ty}px;
      --tr: ${(Math.random()-0.5)*800}deg;
      --ts: ${0.2 + Math.random()*0.5};
      --dur: ${dur}s;
      --ease: ${ease};
      animation-delay: ${Math.random()*0.15}s;
    `;
    layer.appendChild(p);
    setTimeout(() => p.remove(), (dur + 0.5) * 1000);
  }
}

/* ── Sparkles ── */
function spawnSparkles() {
  const icons = ['✨','🌟','⭐','💫','🎊','🎉','🎈'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = icons[Math.floor(Math.random()*icons.length)];
      s.style.cssText = `
        left: ${10 + Math.random()*80}%;
        top:  ${10 + Math.random()*70}%;
        animation-delay: ${Math.random()*0.8}s;
        animation-duration: ${1.2+Math.random()*0.8}s;
      `;
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 2500);
    }, i * 120);
  }
}

/* ── Main open action ── */
let opened = false;
function openEnvelope() {
  if (opened) return;
  opened = true;

  const env = document.getElementById('envelope-container');
  const flap = document.getElementById('env-flap');
  const seal = document.getElementById('seal-btn');
  const hint = document.getElementById('hint');

  // Seal pop
  seal.classList.add('gone');
  hint.classList.add('gone');
  env.classList.add('opened');

  // Get center coords for confetti
  const rect = seal.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  // Flap opens after brief delay
  setTimeout(() => {
    flap.classList.add('open');
  }, 200);

  // Confetti burst
  setTimeout(() => {
    burst(cx, cy);
    spawnSparkles();
  }, 350);

  // Bear appears
  const bearSection = document.getElementById('bear-section');
  setTimeout(() => {
    bearSection.classList.add('show');
  }, 700);

  // Banner text revealed
  const bannerText = document.getElementById('banner-text');
  setTimeout(() => {
    bannerText.classList.add('reveal');
  }, 900);

  // Message appears
  const msg = document.getElementById('message');
  setTimeout(() => {
    msg.classList.add('show');
  }, 100);

  // Second burst for extra celebration
  setTimeout(() => {
    burst(cx - 200, cy - 100);
    burst(cx + 200, cy - 100);
    spawnSparkles();
  }, 1200);

  // Third burst
  setTimeout(() => {
    burst(window.innerWidth * 0.2, window.innerHeight * 0.3);
    burst(window.innerWidth * 0.8, window.innerHeight * 0.3);
    spawnSparkles();
  }, 2200);
}
</script>
</body>
</html>
